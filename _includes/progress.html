<style>
.progress-container {
    display: inline-flex;
    align-items: center;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: white;
    padding: 8px 16px;
    border-radius: 30px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    font-weight: 600;
    font-size: 0.9rem;
    transition: transform 0.3s;
}
.progress-container:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(30, 60, 114, 0.4);
}
.progress-icon {
    margin-right: 8px;
    font-size: 1.2rem;
}
.progress-score {
    color: #00f2fe;
    font-size: 1.1rem;
    margin: 0 4px;
}
</style>

<div class="progress-container" id="global-progress" style="display: none;">
    <span class="progress-icon">🏆</span>
    <span class="progress-text">Study Score: <strong class="progress-score" id="progress-score-val">0</strong> Quizzes Completed</span>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const progressEl = document.getElementById('global-progress');
    const scoreVal = document.getElementById('progress-score-val');
    
    function updateProgress() {
        let count = 0;
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith("quiz_") && key.endsWith("_completed")) {
                if (localStorage.getItem(key) === "true") {
                    count++;
                }
            }
        }
        if(count > 0) {
            scoreVal.textContent = count;
            progressEl.style.display = 'inline-flex';
        } else {
            progressEl.style.display = 'none';
        }
    }

    updateProgress();

    // Listen to local storage changes from same window
    window.addEventListener('quiz_completed', updateProgress);
    // Listen to other tabs
    window.addEventListener('storage', updateProgress);
});
</script>
